apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smartgrid-prod
  namespace: <ARGOCD_NAMESPACE>
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/<YOUR-ORG>/smartgrid-helm.git
    targetRevision: prod
    path: helm/smartgrid
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
      parameters:
        - name: secrets.create
          value: "false"

  destination:
    server: https://kubernetes.default.svc
    namespace: <APP_NAMESPACE>

  syncPolicy:
    # Production sync is MANUAL — trigger from ArgoCD UI or argocd CLI
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
