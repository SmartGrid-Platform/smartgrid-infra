apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smartgrid
  namespace: <ARGOCD_NAMESPACE>
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/<YOUR-ORG>/smartgrid-helm.git
    targetRevision: dev
    path: helm/smartgrid
    helm:
      valueFiles:
        - values.yaml
      # bootstrap.yml pre-creates smartgrid-secrets from AWS Secrets Manager
      # so ArgoCD must NOT recreate the Secret
      parameters:
        - name: secrets.create
          value: "false"

  destination:
    server: https://kubernetes.default.svc
    namespace: <APP_NAMESPACE>

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
