# ArgoCD Application — dev environment
#
# This file is a reference template. The bootstrap.yml workflow generates
# and applies the actual manifest dynamically using values from Terraform
# outputs and GitHub Variables. Do NOT apply this file directly.
#
# Variables substituted by bootstrap.yml:
#   ${ARGOCD_NS}     — ArgoCD namespace (vars.ARGOCD_NAMESPACE or "argocd")
#   ${GITHUB_ORG}    — GitHub org (vars.GITHUB_ORG)
#   ${K8S_NAMESPACE} — App namespace (terraform output k8s_namespace)
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smartgrid
  namespace: ${ARGOCD_NS}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/${GITHUB_ORG}/smartgrid-helm.git
    targetRevision: dev
    path: helm/smartgrid
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: secrets.create
          value: "false"
        - name: configmap.create
          value: "false"

  destination:
    server: https://kubernetes.default.svc
    namespace: ${K8S_NAMESPACE}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
