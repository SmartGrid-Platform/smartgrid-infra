name: CI/CD - AWS EKS Migration & Deployment

on:
  push:
    branches:
      - eksmigration
      - main

jobs:
  security-scans:
    name: Security Scanning (Checkov & Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Run Checkov to scan Terraform files for security vulnerabilities
      - name: Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          output_format: cli
          soft_fail: true

      # Run Trivy scan on codebase
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  deploy-infrastructure:
    name: Deploy AWS Infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: security-scans
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Terraform Init & Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform workspace select dev || terraform workspace new dev
          terraform apply -auto-approve

  build-and-push-images:
    name: Build & Push Docker Images to AWS ECR
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Services
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SERVICES=("auth-service" "consumer-service" "meter-service" "billing-service" "alert-service" "ai-assistant-service")
          for SERVICE in "${SERVICES[@]}"; do
            echo "Building $SERVICE..."
            docker build -t $ECR_REGISTRY/smartgrid-dev-$SERVICE:${{ github.sha }} -t $ECR_REGISTRY/smartgrid-dev-$SERVICE:latest -f services/$SERVICE/Dockerfile .
            echo "Pushing $SERVICE..."
            docker push $ECR_REGISTRY/smartgrid-dev-$SERVICE:${{ github.sha }}
            docker push $ECR_REGISTRY/smartgrid-dev-$SERVICE:latest
          done

      - name: Build and Push Frontend Service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/smartgrid-dev-frontend:${{ github.sha }} -t $ECR_REGISTRY/smartgrid-dev-frontend:latest -f frontend/Dockerfile .
          docker push $ECR_REGISTRY/smartgrid-dev-frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/smartgrid-dev-frontend:latest

  deploy-to-eks:
    name: Deploy to AWS EKS (Helm)
    runs-on: ubuntu-latest
    needs: build-and-push-images
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Install kubectl & Helm
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name smartgrid-dev-cluster

      # Deploy using Helm
      - name: Deploy Helm Chart
        run: |
          cd terraform
          terraform init
          terraform workspace select dev
          DB_HOST=$(terraform output -raw rds_endpoint | cut -d':' -f1)
          ECR_REGISTRY=$(terraform output -raw ecr_registry_url)
          cd ..
          
          helm upgrade --install smartgrid ./kubernetes/smartgrid \
            --namespace default \
            --set ecrRegistryUrl="$ECR_REGISTRY" \
            --set imageTag="${{ github.sha }}" \
            --set database.host="$DB_HOST" \
            --set database.name="smartgrid" \
            --set database.user="smartgrid_user" \
            --set database.password="password" \
            --set jwtSecret="a2b53cdd87431e5630283c448f72ee7b2c91b5da8d1234c9fb66b3f7efc4901f"
