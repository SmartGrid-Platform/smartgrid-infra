name: CI/CD - Build, Push & Deploy to EKS

# Assumes infrastructure (EKS, RDS, ECR, Secrets Manager) already exists.
# Run the infra.yml workflow once to provision it before using this pipeline.

on:
  push:
    branches:
      - eksmigration
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Security Scanning (non-blocking)
  # ─────────────────────────────────────────────────────────────
  security-scans:
    name: Security Scanning (Checkov & Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          output_format: cli
          soft_fail: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────────────────────────────────────────
  # 2. Build & Push all Docker images to ECR
  # ─────────────────────────────────────────────────────────────
  build-and-push-images:
    name: Build & Push Docker Images to ECR
    runs-on: ubuntu-latest
    needs: security-scans
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Services
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SERVICES=("auth-service" "consumer-service" "meter-service" "billing-service" "alert-service" "ai-assistant-service")
          for SERVICE in "${SERVICES[@]}"; do
            echo "Building $SERVICE..."
            docker build -t $ECR_REGISTRY/smartgrid-dev-$SERVICE:${{ github.sha }} \
                         -t $ECR_REGISTRY/smartgrid-dev-$SERVICE:latest \
                         -f services/$SERVICE/Dockerfile .
            echo "Pushing $SERVICE..."
            docker push $ECR_REGISTRY/smartgrid-dev-$SERVICE:${{ github.sha }}
            docker push $ECR_REGISTRY/smartgrid-dev-$SERVICE:latest
          done

      - name: Build and Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/smartgrid-dev-frontend:${{ github.sha }} \
                       -t $ECR_REGISTRY/smartgrid-dev-frontend:latest \
                       -f frontend/Dockerfile .
          docker push $ECR_REGISTRY/smartgrid-dev-frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/smartgrid-dev-frontend:latest

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy to EKS via Helm
  #    All runtime values come from AWS APIs — no Terraform needed.
  # ─────────────────────────────────────────────────────────────
  deploy-to-eks:
    name: Deploy to AWS EKS (Helm)
    runs-on: ubuntu-latest
    needs: build-and-push-images

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl & Helm
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name smartgrid-dev-cluster

      - name: Fetch runtime values from AWS
        id: runtime
        run: |
          # ECR registry — derived from caller identity, no Terraform output needed
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

          # IRSA role ARN — fetched from IAM directly
          IRSA_ROLE_ARN=$(aws iam get-role \
            --role-name "smartgrid-dev-eks-pod-role" \
            --query 'Role.Arn' --output text)

          # DB host, DB password, JWT secret — all stored in Secrets Manager by Terraform
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id smartgrid/config \
            --query 'SecretString' --output text)

          DB_HOST=$(echo "$SECRET_JSON"     | jq -r '.DB_HOST')
          DB_PASSWORD=$(echo "$SECRET_JSON" | jq -r '.DB_PASSWORD')
          JWT_SECRET=$(echo "$SECRET_JSON"  | jq -r '.JWT_SECRET')

          # Mask secrets in logs
          echo "::add-mask::$DB_PASSWORD"
          echo "::add-mask::$JWT_SECRET"

          echo "ecr_registry=$ECR_REGISTRY"     >> $GITHUB_OUTPUT
          echo "irsa_role_arn=$IRSA_ROLE_ARN"   >> $GITHUB_OUTPUT
          echo "db_host=$DB_HOST"               >> $GITHUB_OUTPUT
          echo "db_password=$DB_PASSWORD"       >> $GITHUB_OUTPUT
          echo "jwt_secret=$JWT_SECRET"         >> $GITHUB_OUTPUT

      - name: Helm upgrade / install
        run: |
          cat > /tmp/irsa-values.yaml << EOF
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: "${{ steps.runtime.outputs.irsa_role_arn }}"
          EOF

          helm upgrade --install smartgrid ./kubernetes/smartgrid \
            --namespace default \
            --wait \
            --timeout 10m \
            -f /tmp/irsa-values.yaml \
            --set ecrRegistryUrl="${{ steps.runtime.outputs.ecr_registry }}" \
            --set imageTag="${{ github.sha }}" \
            --set database.host="${{ steps.runtime.outputs.db_host }}" \
            --set database.name="smartgrid" \
            --set database.user="smartgrid_user" \
            --set database.password="${{ steps.runtime.outputs.db_password }}" \
            --set jwtSecret="${{ steps.runtime.outputs.jwt_secret }}"

      - name: Show pod status
        if: always()
        run: kubectl get pods -n default -o wide

  # ─────────────────────────────────────────────────────────────
  # 4. Switch CloudFront origin to the EKS ALB
  #    Waits for the AWS LBC to provision the ALB, then updates
  #    CloudFront via AWS CLI — no Terraform needed.
  # ─────────────────────────────────────────────────────────────
  update-cloudfront:
    name: Switch CloudFront to EKS ALB
    runs-on: ubuntu-latest
    needs: deploy-to-eks

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name smartgrid-dev-cluster

      - name: Wait for EKS ALB to be provisioned
        id: get-alb
        run: |
          echo "Waiting for Load Balancer Controller to provision the ALB (up to 6 minutes)..."
          EKS_ALB_DNS=""
          for i in $(seq 1 36); do
            EKS_ALB_DNS=$(kubectl get ingress smartgrid-ingress -n default \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$EKS_ALB_DNS" ]; then
              echo "ALB ready: $EKS_ALB_DNS"
              break
            fi
            echo "Attempt $i/36: ALB not ready yet, retrying in 10s..."
            sleep 10
          done
          if [ -z "$EKS_ALB_DNS" ]; then
            echo "ERROR: EKS ALB DNS was not assigned within 6 minutes."
            kubectl describe ingress smartgrid-ingress -n default
            exit 1
          fi
          echo "eks_alb_dns=$EKS_ALB_DNS" >> $GITHUB_OUTPUT

      - name: Update CloudFront origin to point at EKS ALB
        run: |
          EKS_ALB_DNS="${{ steps.get-alb.outputs.eks_alb_dns }}"

          # Find the CloudFront distribution by the ALB-API origin ID
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(to_string(Origins), 'ALB-API')].Id" \
            --output text)

          if [ -z "$DIST_ID" ]; then
            echo "ERROR: Could not find CloudFront distribution with ALB-API origin."
            exit 1
          fi

          echo "Found distribution: $DIST_ID"

          # Fetch current config + ETag (required for update)
          CONFIG_JSON=$(aws cloudfront get-distribution-config --id "$DIST_ID")
          ETAG=$(echo "$CONFIG_JSON" | jq -r '.ETag')
          DIST_CONFIG=$(echo "$CONFIG_JSON" | jq '.DistributionConfig')

          # Swap the ALB-API origin domain to the EKS ALB
          UPDATED_CONFIG=$(echo "$DIST_CONFIG" | jq \
            --arg alb "$EKS_ALB_DNS" \
            '.Origins.Items = (.Origins.Items | map(if .Id == "ALB-API" then .DomainName = $alb else . end))')

          echo "$UPDATED_CONFIG" > /tmp/cf-config.json

          aws cloudfront update-distribution \
            --id "$DIST_ID" \
            --if-match "$ETAG" \
            --distribution-config file:///tmp/cf-config.json

          echo "CloudFront distribution $DIST_ID updated."

      - name: Summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- EKS ALB DNS: ${{ steps.get-alb.outputs.eks_alb_dns }}"   >> $GITHUB_STEP_SUMMARY
          echo "- CloudFront now routes /api/* to the EKS ALB"              >> $GITHUB_STEP_SUMMARY
