name: CI/CD - AWS EKS Migration & Deployment

on:
  push:
    branches:
      - eksmigration
      - main
  workflow_dispatch:

jobs:
  security-scans:
    name: Security Scanning (Checkov & Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          output_format: cli
          soft_fail: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  deploy-infrastructure:
    name: Deploy AWS Infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: security-scans
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Terraform Init & Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform workspace select dev || terraform workspace new dev

          # Step 1: Create EKS cluster and node group first (+ all their AWS dependencies).
          # The Kubernetes/Helm providers in providers.tf need a live cluster endpoint to
          # initialize — they can't run against a cluster that doesn't exist yet.
          # -target pulls in all upstream dependencies automatically (VPC, IAM, subnets…).
          terraform apply -auto-approve \
            -target=module.smartgrid_core.aws_eks_cluster.eks \
            -target=module.smartgrid_core.aws_eks_node_group.nodes \
            -target=module.smartgrid_core.aws_iam_openid_connect_provider.eks

          # Step 2: Full apply — EKS is now in state so providers initialize correctly.
          # This creates RDS, CloudFront, ALB, Lambdas, SNS, Secrets Manager,
          # and deploys the AWS Load Balancer Controller via Helm.
          terraform apply -auto-approve

  build-and-push-images:
    name: Build & Push Docker Images to AWS ECR
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Services
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SERVICES=("auth-service" "consumer-service" "meter-service" "billing-service" "alert-service" "ai-assistant-service")
          for SERVICE in "${SERVICES[@]}"; do
            echo "Building $SERVICE..."
            docker build -t $ECR_REGISTRY/smartgrid-dev-$SERVICE:${{ github.sha }} \
                         -t $ECR_REGISTRY/smartgrid-dev-$SERVICE:latest \
                         -f services/$SERVICE/Dockerfile .
            echo "Pushing $SERVICE..."
            docker push $ECR_REGISTRY/smartgrid-dev-$SERVICE:${{ github.sha }}
            docker push $ECR_REGISTRY/smartgrid-dev-$SERVICE:latest
          done

      - name: Build and Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/smartgrid-dev-frontend:${{ github.sha }} \
                       -t $ECR_REGISTRY/smartgrid-dev-frontend:latest \
                       -f frontend/Dockerfile .
          docker push $ECR_REGISTRY/smartgrid-dev-frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/smartgrid-dev-frontend:latest

  deploy-to-eks:
    name: Deploy to AWS EKS (Helm)
    runs-on: ubuntu-latest
    needs: build-and-push-images
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Install kubectl & Helm
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name smartgrid-dev-cluster

      - name: Fetch runtime values from Terraform & Secrets Manager
        id: runtime
        run: |
          cd terraform
          terraform init -input=false
          terraform workspace select dev

          DB_HOST=$(terraform output -raw rds_endpoint | cut -d':' -f1)
          ECR_REGISTRY=$(terraform output -raw ecr_registry_url)
          IRSA_ROLE_ARN=$(terraform output -raw eks_pod_role_arn)
          cd ..

          # Pull DB credentials from Secrets Manager (secret key: smartgrid/config)
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id smartgrid/config \
            --query 'SecretString' --output text)
          DB_PASSWORD=$(echo "$SECRET_JSON" | jq -r '.DB_PASSWORD')
          JWT_SECRET=$(echo "$SECRET_JSON"  | jq -r '.JWT_SECRET')

          # Mask secrets in logs
          echo "::add-mask::$DB_PASSWORD"
          echo "::add-mask::$JWT_SECRET"

          # Export for downstream steps
          echo "db_host=$DB_HOST"           >> $GITHUB_OUTPUT
          echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          echo "irsa_role_arn=$IRSA_ROLE_ARN" >> $GITHUB_OUTPUT
          echo "db_password=$DB_PASSWORD"   >> $GITHUB_OUTPUT
          echo "jwt_secret=$JWT_SECRET"     >> $GITHUB_OUTPUT

      - name: Helm upgrade / install
        run: |
          # Write IRSA annotation to a temp values file to avoid shell escaping issues
          # with dots in the annotation key eks.amazonaws.com/role-arn
          cat > /tmp/irsa-values.yaml << EOF
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: "${{ steps.runtime.outputs.irsa_role_arn }}"
          EOF

          helm upgrade --install smartgrid ./kubernetes/smartgrid \
            --namespace default \
            --wait \
            --timeout 10m \
            -f /tmp/irsa-values.yaml \
            --set ecrRegistryUrl="${{ steps.runtime.outputs.ecr_registry }}" \
            --set imageTag="${{ github.sha }}" \
            --set database.host="${{ steps.runtime.outputs.db_host }}" \
            --set database.name="smartgrid" \
            --set database.user="smartgrid_user" \
            --set database.password="${{ steps.runtime.outputs.db_password }}" \
            --set jwtSecret="${{ steps.runtime.outputs.jwt_secret }}"

      - name: Show pod status
        if: always()
        run: kubectl get pods -n default -o wide

  update-cloudfront:
    name: Switch CloudFront to EKS ALB
    runs-on: ubuntu-latest
    needs: deploy-to-eks
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name smartgrid-dev-cluster

      - name: Wait for EKS ALB to be provisioned
        id: get-alb
        run: |
          echo "Waiting for Load Balancer Controller to provision the ALB (up to 6 minutes)..."
          EKS_ALB_DNS=""
          for i in $(seq 1 36); do
            EKS_ALB_DNS=$(kubectl get ingress smartgrid-ingress -n default \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$EKS_ALB_DNS" ]; then
              echo "ALB ready: $EKS_ALB_DNS"
              break
            fi
            echo "Attempt $i/36: ALB not ready yet, retrying in 10s..."
            sleep 10
          done
          if [ -z "$EKS_ALB_DNS" ]; then
            echo "ERROR: EKS ALB DNS was not assigned within 6 minutes."
            kubectl describe ingress smartgrid-ingress -n default
            exit 1
          fi
          echo "eks_alb_dns=$EKS_ALB_DNS" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Terraform apply — point CloudFront at EKS ALB
        working-directory: ./terraform
        run: |
          terraform init -input=false
          terraform workspace select dev
          terraform apply -auto-approve \
            -target=module.smartgrid_core.aws_cloudfront_distribution.cdn \
            -var="eks_alb_dns=${{ steps.get-alb.outputs.eks_alb_dns }}"

      - name: Summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- EKS ALB DNS: ${{ steps.get-alb.outputs.eks_alb_dns }}" >> $GITHUB_STEP_SUMMARY
          echo "- CloudFront now routes /api/* to the EKS ALB" >> $GITHUB_STEP_SUMMARY
