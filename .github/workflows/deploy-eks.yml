name: CI/CD - Build, Push & Deploy to EKS

on:
  push:
    branches:
      - eksmigration
      - main
  workflow_dispatch:

env:
  CLUSTER_NAME: smartgrid-default-cluster
  ENVIRONMENT: default
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Security Scanning (non-blocking)
  # ─────────────────────────────────────────────────────────────
  security-scans:
    name: Security Scanning (Checkov & Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          output_format: cli
          soft_fail: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────────────────────────────────────────
  # 2. Build frontend and upload static files to S3
  # ─────────────────────────────────────────────────────────────
  upload-frontend:
    name: Build & Upload Frontend to S3
    runs-on: ubuntu-latest
    needs: security-scans

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Upload to S3
        run: |
          FRONTEND_BUCKET=$(aws s3api list-buckets \
            --query "Buckets[?starts_with(Name, 'smartgrid-${{ env.ENVIRONMENT }}-frontend-bucket')].Name | [0]" \
            --output text)
          if [ -z "$FRONTEND_BUCKET" ] || [ "$FRONTEND_BUCKET" = "None" ]; then
            echo "ERROR: Could not find frontend S3 bucket"
            exit 1
          fi
          echo "Uploading to bucket: $FRONTEND_BUCKET"
          aws s3 sync frontend/dist/ s3://$FRONTEND_BUCKET --delete
          echo "Frontend uploaded successfully"

  # ─────────────────────────────────────────────────────────────
  # 3. Build & Push all Docker images to ECR
  # ─────────────────────────────────────────────────────────────
  build-and-push-images:
    name: Build & Push Docker Images to ECR
    runs-on: ubuntu-latest
    needs: security-scans
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Services
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SERVICES=("auth-service" "consumer-service" "meter-service" "billing-service" "alert-service" "ai-assistant-service")
          for SERVICE in "${SERVICES[@]}"; do
            echo "Building $SERVICE..."
            docker build \
              -t $ECR_REGISTRY/smartgrid-${{ env.ENVIRONMENT }}-$SERVICE:${{ github.sha }} \
              -t $ECR_REGISTRY/smartgrid-${{ env.ENVIRONMENT }}-$SERVICE:latest \
              -f services/$SERVICE/Dockerfile .
            echo "Pushing $SERVICE..."
            docker push $ECR_REGISTRY/smartgrid-${{ env.ENVIRONMENT }}-$SERVICE:${{ github.sha }}
            docker push $ECR_REGISTRY/smartgrid-${{ env.ENVIRONMENT }}-$SERVICE:latest
          done

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy to EKS via Helm
  # ─────────────────────────────────────────────────────────────
  deploy-to-eks:
    name: Deploy to AWS EKS (Helm)
    runs-on: ubuntu-latest
    needs: [build-and-push-images, upload-frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl & Helm
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Free pod slots on single t3.small node
        run: |
          # t3.small ENI limit = 11 pods max. System pods alone use 9 slots:
          # 3 from Container Insights addon + 2 from LBC default replicas + 4 core.
          # Remove the addon (frees 3 slots) and shrink LBC to 1 replica (frees 1).
          # Result: 5 system pods, leaving 6 slots — exactly enough for 6 services.

          echo "--- Deleting Container Insights addon (frees 3 pod slots) ---"
          aws eks delete-addon \
            --cluster-name ${{ env.CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }} \
            --addon-name amazon-cloudwatch-observability \
            --preserve 2>/dev/null || echo "Addon not present, skipping."

          echo "--- Scaling LBC to 1 replica (frees 1 pod slot) ---"
          kubectl scale deployment aws-load-balancer-controller \
            --replicas=1 -n kube-system 2>/dev/null || true

          echo "--- Waiting for Container Insights pods to terminate (up to 90s) ---"
          kubectl wait --for=delete pods --all \
            -n amazon-cloudwatch --timeout=90s 2>/dev/null || true

          echo "--- Pod count after cleanup ---"
          kubectl get pods -A --no-headers | wc -l

      - name: Fetch runtime values from AWS
        id: runtime
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

          IRSA_ROLE_ARN=$(aws iam get-role \
            --role-name "smartgrid-${{ env.ENVIRONMENT }}-eks-pod-role" \
            --query 'Role.Arn' --output text)

          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id smartgrid/config \
            --query 'SecretString' --output text)

          DB_HOST=$(echo "$SECRET_JSON"     | jq -r '.DB_HOST')
          DB_PASSWORD=$(echo "$SECRET_JSON" | jq -r '.DB_PASSWORD')
          JWT_SECRET=$(echo "$SECRET_JSON"  | jq -r '.JWT_SECRET')

          echo "::add-mask::$DB_PASSWORD"
          echo "::add-mask::$JWT_SECRET"

          echo "ecr_registry=$ECR_REGISTRY"   >> $GITHUB_OUTPUT
          echo "irsa_role_arn=$IRSA_ROLE_ARN" >> $GITHUB_OUTPUT
          echo "db_host=$DB_HOST"             >> $GITHUB_OUTPUT
          echo "db_password=$DB_PASSWORD"     >> $GITHUB_OUTPUT
          echo "jwt_secret=$JWT_SECRET"       >> $GITHUB_OUTPUT

      - name: Clean up stale release and pods
        run: |
          # Uninstall any previous (possibly failed) Helm release so old pods
          # don't occupy the node's pod slots and block the migration job pod.
          helm uninstall smartgrid -n production 2>/dev/null || true

          # Delete stale hook jobs left by previous failed runs
          kubectl delete jobs -n production --all --ignore-not-found=true 2>/dev/null || true

          # Wait for pods to terminate before the fresh install starts
          echo "Waiting for all pods in production to terminate..."
          kubectl wait --for=delete pods --all -n production --timeout=120s 2>/dev/null || true

      - name: Helm upgrade / install
        run: |
          cat > /tmp/runtime-values.yaml << EOF
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: "${{ steps.runtime.outputs.irsa_role_arn }}"
          EOF

          helm upgrade --install smartgrid ./helm/smartgrid \
            --namespace production \
            --create-namespace \
            --wait \
            --timeout 15m \
            -f /tmp/runtime-values.yaml \
            --set environment=${{ env.ENVIRONMENT }} \
            --set ecrRegistryUrl="${{ steps.runtime.outputs.ecr_registry }}" \
            --set imageTag="${{ github.sha }}" \
            --set database.host="${{ steps.runtime.outputs.db_host }}" \
            --set database.name="smartgrid" \
            --set database.user="smartgrid_user" \
            --set database.password="${{ steps.runtime.outputs.db_password }}" \
            --set jwtSecret="${{ steps.runtime.outputs.jwt_secret }}" \
            --set adminName="Admin" \
            --set adminEmail="${{ secrets.ADMIN_EMAIL || 'admin@smartgrid.com' }}" \
            --set adminPassword="${{ secrets.ADMIN_PASSWORD || 'Admin@123' }}"

      - name: Diagnostics on failure
        if: always()
        run: |
          echo "====== NODE CAPACITY ======"
          kubectl describe nodes | grep -A 10 "Allocatable:\|Allocated resources:\|Non-terminated Pods:"

          echo ""
          echo "====== ALL PODS (all namespaces) ======"
          kubectl get pods -A -o wide

          echo ""
          echo "====== PRODUCTION PODS DETAIL ======"
          kubectl get pods -n production -o wide

          echo ""
          echo "====== EVENTS (last 30) ======"
          kubectl get events -n production --sort-by=.lastTimestamp | tail -30

          echo ""
          echo "====== PENDING POD DESCRIBE ======"
          for pod in $(kubectl get pods -n production --field-selector=status.phase=Pending -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe pod "$pod" -n production | grep -A 5 "Events:\|Reason:\|Message:"
          done

          echo ""
          echo "====== CRASHING POD LOGS ======"
          for pod in $(kubectl get pods -n production -o jsonpath='{range .items[?(@.status.containerStatuses[0].state.waiting.reason=="CrashLoopBackOff")]}{.metadata.name}{"\n"}{end}' 2>/dev/null); do
            echo "--- logs: $pod ---"
            kubectl logs "$pod" -n production --tail=50 2>/dev/null || kubectl logs "$pod" -n production --previous --tail=50 2>/dev/null || true
          done

          echo ""
          echo "====== MIGRATION JOB ======"
          kubectl get jobs -n production 2>/dev/null || true
          for pod in $(kubectl get pods -n production -l app=smartgrid-db-migrate -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- migrate logs: $pod ---"
            kubectl logs "$pod" -n production --tail=50 2>/dev/null || true
          done

  # ─────────────────────────────────────────────────────────────
  # 4. Switch CloudFront origin to the EKS ALB
  # ─────────────────────────────────────────────────────────────
  update-cloudfront:
    name: Switch CloudFront to EKS ALB
    runs-on: ubuntu-latest
    needs: deploy-to-eks

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Wait for EKS ALB to be provisioned
        id: get-alb
        run: |
          echo "Waiting for Load Balancer Controller to provision the ALB (up to 6 minutes)..."
          EKS_ALB_DNS=""
          for i in $(seq 1 36); do
            EKS_ALB_DNS=$(kubectl get ingress smartgrid-ingress -n production \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$EKS_ALB_DNS" ]; then
              echo "ALB ready: $EKS_ALB_DNS"
              break
            fi
            echo "Attempt $i/36: ALB not ready yet, retrying in 10s..."
            sleep 10
          done
          if [ -z "$EKS_ALB_DNS" ]; then
            echo "ERROR: EKS ALB DNS was not assigned within 6 minutes."
            kubectl describe ingress smartgrid-ingress -n production
            exit 1
          fi
          echo "eks_alb_dns=$EKS_ALB_DNS" >> $GITHUB_OUTPUT

      - name: Update CloudFront origin to point at EKS ALB
        run: |
          EKS_ALB_DNS="${{ steps.get-alb.outputs.eks_alb_dns }}"

          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(to_string(Origins), 'ALB-API')].Id" \
            --output text)

          if [ -z "$DIST_ID" ]; then
            echo "ERROR: Could not find CloudFront distribution with ALB-API origin."
            exit 1
          fi

          echo "Found distribution: $DIST_ID"

          CONFIG_JSON=$(aws cloudfront get-distribution-config --id "$DIST_ID")
          ETAG=$(echo "$CONFIG_JSON" | jq -r '.ETag')
          DIST_CONFIG=$(echo "$CONFIG_JSON" | jq '.DistributionConfig')

          UPDATED_CONFIG=$(echo "$DIST_CONFIG" | jq \
            --arg alb "$EKS_ALB_DNS" \
            '.Origins.Items = (.Origins.Items | map(if .Id == "ALB-API" then .DomainName = $alb else . end))')

          echo "$UPDATED_CONFIG" > /tmp/cf-config.json

          aws cloudfront update-distribution \
            --id "$DIST_ID" \
            --if-match "$ETAG" \
            --distribution-config file:///tmp/cf-config.json

          echo "CloudFront distribution $DIST_ID updated."

      - name: Summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- EKS ALB DNS: ${{ steps.get-alb.outputs.eks_alb_dns }}"  >> $GITHUB_STEP_SUMMARY
          echo "- CloudFront URL: https://d3juvpxiiqd480.cloudfront.net"   >> $GITHUB_STEP_SUMMARY
          echo "- API base: https://d3juvpxiiqd480.cloudfront.net/api"     >> $GITHUB_STEP_SUMMARY
