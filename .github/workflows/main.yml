name: Main CI — Build All Services + Update Helm

# This is the entry point workflow for the smartgrid-app repo.
# Trigger: push to dev branch (rename main→dev when you create the app repo)
on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  # ── PER-SERVICE BUILDS (parallel) ─────────────────────────────────
  ci-auth-service:
    name: auth-service
    uses: ./.github/workflows/ci-auth-service.yml
    secrets: inherit

  ci-consumer-service:
    name: consumer-service
    uses: ./.github/workflows/ci-consumer-service.yml
    secrets: inherit

  ci-meter-service:
    name: meter-service
    uses: ./.github/workflows/ci-meter-service.yml
    secrets: inherit

  ci-billing-service:
    name: billing-service
    uses: ./.github/workflows/ci-billing-service.yml
    secrets: inherit

  ci-alert-service:
    name: alert-service
    uses: ./.github/workflows/ci-alert-service.yml
    secrets: inherit

  ci-ai-assistant-service:
    name: ai-assistant-service
    uses: ./.github/workflows/ci-ai-assistant-service.yml
    secrets: inherit

  # ── SAST / DEPENDENCY SCANNING (non-blocking) ─────────────────────
  sast:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Snyk test
        uses: snyk/actions/node@master
        with:
          args: --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── NOTIFY IF SECURITY SCANS FAIL ─────────────────────────────────
  notify-security:
    name: Notify Security Issues
    needs: [sast, snyk]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      context: 'Security scan (SonarCloud/Snyk) reported issues'
    secrets: inherit

  # ── UPDATE HELM REPO (triggers ArgoCD GitOps deploy) ─────────────
  # Runs only when ALL service CI jobs succeed
  update-helm-values:
    name: Update Helm imageTag → triggers ArgoCD
    runs-on: ubuntu-latest
    needs:
      - ci-auth-service
      - ci-consumer-service
      - ci-meter-service
      - ci-billing-service
      - ci-alert-service
      - ci-ai-assistant-service
    # Skip if any CI job failed
    if: success()

    steps:
      - name: Compute short SHA
        id: tag
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Checkout smartgrid-helm repo (dev branch)
        uses: actions/checkout@v3
        with:
          # Uses GH_PAT to write to the helm repo (cross-repo commit)
          repository: <YOUR-ORG>/smartgrid-helm
          ref: dev
          token: ${{ secrets.GH_PAT }}
          path: helm-repo

      - name: Update imageTag in values.yaml
        run: |
          cd helm-repo
          TAG="${{ steps.tag.outputs.short_sha }}"
          # Update the top-level imageTag field
          sed -i "s/^imageTag: .*/imageTag: \"${TAG}\"/" helm/smartgrid/values.yaml
          echo "Updated imageTag to: $TAG"
          grep "imageTag" helm/smartgrid/values.yaml

      - name: Commit and push to helm repo
        run: |
          cd helm-repo
          git config user.email "ci@github.com"
          git config user.name "SmartGrid CI"
          git add helm/smartgrid/values.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update imageTag to ${{ steps.tag.outputs.short_sha }} [skip ci]"
          git push origin dev
          echo "Helm repo updated — ArgoCD will detect and deploy automatically."
