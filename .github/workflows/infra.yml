name: Infrastructure Management (Terraform)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init
          terraform workspace select dev || terraform workspace new dev

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        working-directory: ./terraform
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ./terraform
        run: terraform destroy -auto-approve

      - name: Show Outputs
        if: github.event.inputs.action == 'apply'
        working-directory: ./terraform
        run: |
          echo "### Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          echo "- EKS Cluster: $(terraform output -raw eks_cluster_name)"        >> $GITHUB_STEP_SUMMARY
          echo "- ECR Registry: $(terraform output -raw ecr_registry_url)"       >> $GITHUB_STEP_SUMMARY
          echo "- RDS Endpoint: $(terraform output -raw rds_endpoint)"           >> $GITHUB_STEP_SUMMARY
          echo "- CloudFront: $(terraform output -raw cloudfront_url)"           >> $GITHUB_STEP_SUMMARY
