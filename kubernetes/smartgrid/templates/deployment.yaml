{{- range $serviceName, $service := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}
  labels:
    app: {{ $serviceName }}
spec:
  replicas: {{ $service.replicaCount }}
  selector:
    matchLabels:
      app: {{ $serviceName }}
  template:
    metadata:
      labels:
        app: {{ $serviceName }}
    spec:
      serviceAccountName: smartgrid-sa
      containers:
        - name: {{ $serviceName }}
          image: "{{ $.Values.dockerHubUser }}/{{ $service.image }}:{{ $.Values.imageTag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ $service.port }}
          envFrom:
            - configMapRef:
                name: smartgrid-config
            - secretRef:
                name: smartgrid-secrets
          env:
            - name: PORT
              value: {{ $service.port | quote }}
            {{- range $key, $val := $service.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: {{ if eq $serviceName "ai-assistant-service" }}/api/assistant/health{{ else }}/health{{ end }}
              port: {{ $service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ if eq $serviceName "ai-assistant-service" }}/api/assistant/health{{ else }}/health{{ end }}
              port: {{ $service.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
---
{{- end }}
