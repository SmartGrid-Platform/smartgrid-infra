apiVersion: v1
kind: Secret
metadata:
  name: smartgrid-secrets
  labels:
    app.kubernetes.io/name: smartgrid
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
data:
  DB_PASSWORD: {{ .Values.database.password | b64enc | quote }}
  JWT_SECRET: {{ .Values.jwtSecret | b64enc | quote }}
