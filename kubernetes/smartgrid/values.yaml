# Default values for smartgrid Helm Chart.
# This is a YAML-formatted file.

environment: dev
awsRegion: ap-south-1
imageTag: latest
dockerHubUser: "likhi161" # Replace with your Docker Hub username

# Database credentials (to be securely passed during helm install or retrieved via AWS Secrets Manager)
database:
  host: "smartgrid-db.c123456789.ap-south-1.rds.amazonaws.com"
  name: "smartgrid_dev"
  user: "admin"
  password: "password123" # In production, pull from AWS Secrets Manager or inject securely

# JWT and external integrations
jwtSecret: "a2b53cdd87431e5630283c448f72ee7b2c91b5da8d1234c9fb66b3f7efc4901f"

# Ingress Configuration
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
  hosts:
    - host: ""
      paths:
        - path: /api/auth
          pathType: Prefix
          serviceName: auth-service
          servicePort: 3001
        - path: /api/consumers
          pathType: Prefix
          serviceName: consumer-service
          servicePort: 3002
        - path: /api/meters
          pathType: Prefix
          serviceName: meter-service
          servicePort: 3003
        - path: /api/bills
          pathType: Prefix
          serviceName: billing-service
          servicePort: 3004
        - path: /api/tariffs
          pathType: Prefix
          serviceName: billing-service
          servicePort: 3004
        - path: /api/recharges
          pathType: Prefix
          serviceName: billing-service
          servicePort: 3004
        - path: /api/alerts
          pathType: Prefix
          serviceName: alert-service
          servicePort: 3005
        - path: /api/inspections
          pathType: Prefix
          serviceName: alert-service
          servicePort: 3005
        - path: /api/assistant
          pathType: Prefix
          serviceName: ai-assistant-service
          servicePort: 4004

# Service Account configurations for AWS IRSA (IAM Roles for Service Accounts)
serviceAccount:
  create: true
  annotations:
    # Will be populated with the IAM Role ARN created by Terraform
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/smartgrid-dev-eks-pod-role"

# Microservices configuration
services:
  auth-service:
    port: 3001
    replicaCount: 1
    image: auth-service
    env: {}

  consumer-service:
    port: 3002
    replicaCount: 1
    image: consumer-service
    env: {}

  meter-service:
    port: 3003
    replicaCount: 1
    image: meter-service
    env: {}

  billing-service:
    port: 3004
    replicaCount: 1
    image: billing-service
    env:
      LAMBDA_BILL_GENERATOR: "smartgrid-dev-bill-generator"
      LAMBDA_TARIFF_ENGINE: "smartgrid-dev-tariff-engine"
      LAMBDA_UNIT_CALCULATOR: "smartgrid-dev-unit-calculator"
      S3_BUCKET_NAME: "smartgrid-dev-billing-bucket"

  alert-service:
    port: 3005
    replicaCount: 1
    image: alert-service
    env: {}

  ai-assistant-service:
    port: 4004
    replicaCount: 1
    image: ai-assistant-service
    env:
      BEDROCK_REGION: "us-east-1"
      BEDROCK_MODEL_PRIMARY: "amazon.nova-pro-v1:0"
      BEDROCK_MODEL_FALLBACK: "amazon.nova-lite-v1:0"
      CONSUMER_SERVICE_URL: "http://consumer-service:3002"
      BILLING_SERVICE_URL: "http://billing-service:3004"
      METER_SERVICE_URL: "http://meter-service:3003"
