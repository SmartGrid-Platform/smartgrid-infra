apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartgrid-ingress
  namespace: production
  labels:
    app.kubernetes.io/name: smartgrid
    environment: production
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/load-balancer-name: smartgrid-production-eks-alb
spec:
  rules:
    - http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          - path: /api/consumers
            pathType: Prefix
            backend:
              service:
                name: consumer-service
                port:
                  number: 3002
          - path: /api/meters
            pathType: Prefix
            backend:
              service:
                name: meter-service
                port:
                  number: 3003
          - path: /api/bills
            pathType: Prefix
            backend:
              service:
                name: billing-service
                port:
                  number: 3004
          - path: /api/tariffs
            pathType: Prefix
            backend:
              service:
                name: billing-service
                port:
                  number: 3004
          - path: /api/recharges
            pathType: Prefix
            backend:
              service:
                name: billing-service
                port:
                  number: 3004
          - path: /api/alerts
            pathType: Prefix
            backend:
              service:
                name: alert-service
                port:
                  number: 3005
          - path: /api/inspections
            pathType: Prefix
            backend:
              service:
                name: alert-service
                port:
                  number: 3005
          - path: /api/assistant
            pathType: Prefix
            backend:
              service:
                name: ai-assistant-service
                port:
                  number: 4004
