# SonarCloud configuration for SmartGrid Platform
#
# Set these once in your SonarCloud account and update the values below:
#   sonar.organization — your SonarCloud org slug (matches GitHub org)
#   sonar.projectKey   — unique key within the org (typically <org>_<repo>)
#
# The SONAR_TOKEN secret must be set in:
#   smartgrid-app → Settings → Secrets → SONAR_TOKEN
#
# These values are NOT sensitive — they belong in this file, not in secrets.

sonar.organization=likhi161
sonar.projectKey=likhi161_smartgrid-app
sonar.projectName=SmartGrid Platform

# Source paths to scan
sonar.sources=services,frontend/src,shared
sonar.tests=services

# Exclusions — node_modules, build artifacts, generated files
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/package-lock.json,\
  **/migrations/**,\
  lambdas/**,\
  kubernetes/**

sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage (enable once test suites produce lcov output)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.javascript.node.maxspace=4096
