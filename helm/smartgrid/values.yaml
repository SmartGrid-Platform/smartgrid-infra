environment: default

adminName: "Admin"
adminEmail: "admin@smartgrid.com"
adminPassword: "Admin@123"
awsRegion: ap-south-1

# imageTag is updated automatically by CI (main.yml update-helm-values job)
imageTag: latest

# REPLACE with your actual ECR registry URL after terraform apply
# Format: <account-id>.dkr.ecr.<region>.amazonaws.com
ecrRegistryUrl: "169720629031.dkr.ecr.ap-south-1.amazonaws.com"

database:
  # REPLACE with your RDS endpoint from terraform output rds_endpoint
  host: "smartgrid-db.c123456789.ap-south-1.rds.amazonaws.com"
  name: "smartgrid"
  user: "smartgrid_user"
  # Only needed when secrets.create=true (direct Helm pipeline mode)
  # Leave as placeholder when secrets.create=false (ArgoCD mode — bootstrap seeds the secret)
  password: "REPLACE_WITH_SECRET_OR_LEAVE_FOR_ARGOCD_MODE"

# Only needed when secrets.create=true
jwtSecret: "REPLACE_WITH_SECRET_OR_LEAVE_FOR_ARGOCD_MODE"

# secrets.create=true  → Helm creates the K8s Secret from values above (current pipeline)
# secrets.create=false → bootstrap.yml pre-creates the secret from AWS Secrets Manager;
#                        ArgoCD application.yaml passes this as a helm parameter override
secrets:
  create: true

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/load-balancer-name: smartgrid-default-eks-alb
  hosts:
    - host: ""
      paths:
        - path: /api/auth
          pathType: Prefix
          serviceName: auth-service
          servicePort: 3001
        - path: /api/consumers
          pathType: Prefix
          serviceName: consumer-service
          servicePort: 3002
        - path: /api/meters
          pathType: Prefix
          serviceName: meter-service
          servicePort: 3003
        - path: /api/bills
          pathType: Prefix
          serviceName: billing-service
          servicePort: 3004
        - path: /api/tariffs
          pathType: Prefix
          serviceName: billing-service
          servicePort: 3004
        - path: /api/recharges
          pathType: Prefix
          serviceName: billing-service
          servicePort: 3004
        - path: /api/alerts
          pathType: Prefix
          serviceName: alert-service
          servicePort: 3005
        - path: /api/inspections
          pathType: Prefix
          serviceName: alert-service
          servicePort: 3005
        - path: /api/assistant
          pathType: Prefix
          serviceName: ai-assistant-service
          servicePort: 4004

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::169720629031:role/smartgrid-default-eks-pod-role"

services:
  auth-service:
    port: 3001
    replicaCount: 2
    image: auth-service
    env: {}

  consumer-service:
    port: 3002
    replicaCount: 2
    image: consumer-service
    env: {}

  meter-service:
    port: 3003
    replicaCount: 2
    image: meter-service
    env: {}
    hpa:
      minReplicas: 2
      maxReplicas: 6
      cpuThreshold: 70
      memoryThreshold: 80

  billing-service:
    port: 3004
    replicaCount: 2
    image: billing-service
    env: {}
    hpa:
      minReplicas: 2
      maxReplicas: 6
      cpuThreshold: 70
      memoryThreshold: 80

  alert-service:
    port: 3005
    replicaCount: 2
    image: alert-service
    env: {}

  ai-assistant-service:
    port: 4004
    replicaCount: 2
    image: ai-assistant-service
    env:
      BEDROCK_REGION: "us-east-1"
      BEDROCK_MODEL_PRIMARY: "us.amazon.nova-pro-v1:0"
      BEDROCK_MODEL_FALLBACK: "us.amazon.nova-lite-v1:0"
      CONSUMER_SERVICE_URL: "http://consumer-service:3002"
      BILLING_SERVICE_URL: "http://billing-service:3004"
      METER_SERVICE_URL: "http://meter-service:3003"
