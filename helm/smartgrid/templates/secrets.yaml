{{- if .Values.secrets.create }}
# Created by Helm when secrets.create=true (current pipeline mode).
# In ArgoCD GitOps mode, set secrets.create=false — bootstrap.yml pre-creates
# this secret from AWS Secrets Manager before ArgoCD deploys.
apiVersion: v1
kind: Secret
metadata:
  name: smartgrid-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: smartgrid
    environment: {{ .Values.environment }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
data:
  DB_PASSWORD:    {{ .Values.database.password  | b64enc | quote }}
  JWT_SECRET:     {{ .Values.jwtSecret          | b64enc | quote }}
  ADMIN_NAME:     {{ .Values.adminName          | b64enc | quote }}
  ADMIN_EMAIL:    {{ .Values.adminEmail         | b64enc | quote }}
  ADMIN_PASSWORD: {{ .Values.adminPassword      | b64enc | quote }}
{{- end }}
