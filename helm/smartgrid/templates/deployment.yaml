{{- range $serviceName, $service := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $serviceName }}
    environment: {{ $.Values.environment }}
spec:
  replicas: {{ $service.replicaCount }}
  selector:
    matchLabels:
      app: {{ $serviceName }}
  template:
    metadata:
      labels:
        app: {{ $serviceName }}
        environment: {{ $.Values.environment }}
    spec:
      serviceAccountName: smartgrid-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: {{ $serviceName }}
          image: "{{ $.Values.ecrRegistryUrl }}/smartgrid-{{ $.Values.environment }}-{{ $service.image }}:{{ $.Values.imageTag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ $service.port }}
          envFrom:
            - configMapRef:
                name: smartgrid-config
            - secretRef:
                name: smartgrid-secrets
          env:
            - name: PORT
              value: {{ $service.port | quote }}
            {{- range $key, $val := $service.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: {{ if eq $serviceName "ai-assistant-service" }}/api/assistant/healthz{{ else }}/healthz{{ end }}
              port: {{ $service.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ if eq $serviceName "ai-assistant-service" }}/api/assistant/ready{{ else }}/ready{{ end }}
              port: {{ $service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
---
{{- end }}
